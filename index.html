<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="UTF-8">
		<title>
			Visualización de Plan de Estudios - Ingeniería en Producción Industrial
		</title>
		<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body { overflow: hidden; height: 100vh; }

		#split { width: 100vw; height: 100vh; }

		#svg-panel {
		background: white;
		display: flex;
		justify-content: center;
		align-items: center;
		overflow: auto;
		position: relative;
		}

		#svg-panel object {
		width: 100%;
		height: 100%;
		display: block;
		}

		#table-panel {
		background: #f5f5f5;
		padding: 15px;
		overflow: auto;
		}

		.gutter.gutter-vertical {
		background: #4a90e2;
		cursor: row-resize;
		height: 6px !important;
		}

		.gutter.gutter-vertical:hover { background: #357abd; }
		</style>
		<link rel="stylesheet" href="simple-table.css">
		<link rel="stylesheet" href="simple-details.css">
		<script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>
		<script src="simple-table.js"></script>
	</head>
	<body>
		<div id="split">
			<div id="svg-panel">
				<object id="svg-object" type="image/svg+xml" data="grafo_cursos.svg">
				</object>
			</div>
			<div id="table-panel">
				<div id="tabla"></div>
			</div>
		</div>
		<script src="svg-controls.js"></script>
		<script src="simple-details.js"></script>
		<script>

		let table = null;
		let svgControl = null;
		let svgToRowId = new Map();
		let rowToSvgIds = new Map();

		function loadDataFromSVG() {
		const svgObject = document.getElementById('svg-object');

		svgObject.addEventListener('load', function() {
		const svgDoc = svgObject.contentDocument;
		if (!svgDoc) {
		  console.error('Could not access SVG document');
		  return;
		}

		svgToRowId.clear();
		rowToSvgIds.clear();

		const vRows = svgDoc.getElementsByTagName('v:row');
		for (let row of vRows) {
		  const rowId = row.getAttribute('id');
		  const hrefs = row.getAttribute('hrefs');
		  if (rowId && hrefs) {
		    const ids = hrefs.split(',').map(h => h.trim()).filter(Boolean);
		    rowToSvgIds.set(rowId, ids);
		    ids.forEach(svgId => svgToRowId.set(svgId, rowId));
		  }
		}

		if (svgToRowId.size === 0) {
		  svgDoc.querySelectorAll('[href]').forEach(el => {
		    const href = el.getAttribute('href');
		    if (href && href.startsWith('#') && el.id) {
		      const rowId = href.substring(1);
		      svgToRowId.set(el.id, rowId);
		      if (!rowToSvgIds.has(rowId)) rowToSvgIds.set(rowId, []);
		      rowToSvgIds.get(rowId).push(el.id);
		    }
		  });
		}

		/* Adaptado: nuestro SVG tiene dos tablas (cursos_nodos, cursos_enlaces).
		   La tabla principal a mostrar es "cursos_nodos" (los cursos).
		   Se busca por nombre en vez de por visualization="chart",
		   ya que esta página es propia del proyecto y no una libreria. */
		let factTable = null;
		const allTables = svgDoc.getElementsByTagName('v:table');
		for (let t of allTables) {
		  if (t.getAttribute('name') === 'cursos_nodos') {
		    factTable = t;
		    break;
		  }
		}

		if (!factTable) {
		  const tablesFallback = svgDoc.querySelectorAll('table');
		  for (let t of tablesFallback) {
		    if (t.getAttribute('name') === 'cursos_nodos') {
		      factTable = t;
		      break;
		    }
		  }
		}

		if (!factTable) {
		  console.error('<v:table name="cursos_nodos"> not found');
		  return;
		}

		const columnNames = factTable.getAttribute('columns').split(',').map(c => c.trim());
		const rows = factTable.getElementsByTagName('v:row');
		const data = [];

		for (let row of rows) {
		  const rowId = row.getAttribute('id');
		  const content = row.textContent.trim();
		  const parts = content.split(',');
		  const record = {};
		  columnNames.forEach((col, idx) => {
		    let val = parts[idx];
		    record[col] = isNaN(val) ? val : parseFloat(val);
		  });
		  record['_rowId'] = rowId;
		  data.push(record);
		}

		if (data.length === 0) {
		  console.error('No data rows found');
		  return;
		}

		const columns = Object.keys(data[0])
		  .filter(k => k !== '_rowId')
		  .map(key => ({
		    field: key,
		    title: key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
		    width: (100 / (Object.keys(data[0]).length - 1)) + '%'
		  }));

		const detailBox = new SimpleDetail({ title: "Detalle del curso" });

		table = new SimpleTable("tabla", {
		      data: data,
		      columns: columns,
		      selectable: true,
		      onRowSelect: (selectedRows) => {
		        if (!svgControl) return;
		        const targetSvgIds = [];
		    
		        selectedRows.forEach(row => {
		          const rowId = row._rowId;
		          for (let [svgId, refRowId] of svgToRowId.entries()) {
		            if (refRowId === rowId) {
		              targetSvgIds.push(svgId);
		            }
		          }
		        });

		        svgControl.selectMultiple(targetSvgIds);
		      },
		      
		      onRowDblClick: (rowData) => {
		        detailBox.show(rowData, columns);
		      },

		      onFilter: (filteredRows) => {
		        if (!svgControl) return;
		        /* IDs de circulos/textos visibles segun el filtro */
		        const visibleNodeIds = new Set(
		          filteredRows.flatMap(row => rowToSvgIds.get(row._rowId) || [])
		        );
		        const visibleRowIds = new Set(filteredRows.map(row => row._rowId));

		        /* Los enlaces (lineas) solo deben verse si AMBOS extremos
		           (fuente y destino) siguen visibles tras el filtro. */
		        const visibleEdgeIds = [];
		        const edgeRows = svgDoc.querySelectorAll('v\\:table[name="cursos_enlaces"] v\\:row, table[name="cursos_enlaces"] row');
		        edgeRows.forEach(edgeRow => {
		          const content = edgeRow.textContent.trim().split(',');
		          const fuenteRowId = content[1];
		          const destinoRowId = content[2];
		          if (visibleRowIds.has(fuenteRowId) && visibleRowIds.has(destinoRowId)) {
		            const edgeRowId = edgeRow.getAttribute('id');
		            const svgIds = rowToSvgIds.get(edgeRowId) || [];
		            svgIds.forEach(id => visibleEdgeIds.push(id));
		          }
		        });

		        const visibleSvgIds = [...visibleNodeIds, ...visibleEdgeIds];
		        svgControl.filterByIds(visibleSvgIds);
		      }
		    });

  		const connectSVGControl = () => {
  		  if (svgObject.__SVGControl) {
  		    svgControl = svgObject.__SVGControl;
  		    svgControl.setCallback('select', (svgElement) => {
  		      if (!table) return;
  		      table.selectedRows.clear();
  		      if (svgElement && svgToRowId.has(svgElement.id)) {
  		        const rowId = svgToRowId.get(svgElement.id);
  		        const targetRow = table.data.find(row => String(row._rowId) === String(rowId));
  		        if (targetRow) table.selectedRows.add(targetRow);
  		      }
  		      table.render();
  		    });
  		    svgControl.setCallback('multiSelect', (svgElements) => {
  		      if (!table) return;
  		      table.selectedRows.clear();

  		      svgElements.forEach(el => {
  		        if (el && svgToRowId.has(el.id)) {
  		          const rowId = svgToRowId.get(el.id);
  		          const targetRow = table.data.find(row => String(row._rowId) === String(rowId));
  		          if (targetRow && !table.selectedRows.has(targetRow)) {
  		            table.selectedRows.add(targetRow);
  		          }
  		        }
  		      });
  		      table.render();
  		      if (typeof table.options.onRowSelect === 'function') {
  		        table.options.onRowSelect(Array.from(table.selectedRows));
  		      }
  		    });
  		    svgControl.setCallback('dblclick', (svgElement) => {
  		      if (!table || !svgElement) return;
  		      const rowId = svgToRowId.get(svgElement.id);
  		      if (!rowId) return;
  		      const row = table.data.find(r => String(r._rowId) === String(rowId));
  		      if (row) detailBox.show(row, columns);
  		    });

  		  } else {
  		    setTimeout(connectSVGControl, 50);
  		  }
  		};
  		connectSVGControl();
		});
		}

		Split(["#svg-panel", "#table-panel"], {
		sizes: [50, 50],
		direction: "vertical",
		gutterSize: 6,
		minSize: [100, 150]
		});

		loadDataFromSVG();
		</script>
	</body>
</html>
